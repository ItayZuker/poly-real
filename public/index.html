<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poly Real</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="app">
    <header class="app-header controls">
      <h1 class="app-title">Poly Real</h1>
      <select id="market-select"></select>
      <div id="countdown" class="countdown">—</div>
      <label class="header-field header-field--plain">
        <span class="header-field-label">Latency (ms)</span>
        <span id="feed-latency-ms" class="header-field-value">—</span>
      </label>
      <div id="schedule-highlighted-summary" class="schedule-highlighted-summary" hidden>
        <div class="schedule-highlighted-stats-dots"></div>
        <span class="schedule-highlighted-pnl">—</span>
        <button
          type="button"
          id="schedule-highlighted-clear"
          class="schedule-highlighted-clear-btn"
          aria-label="Clear highlighted cards"
          title="Clear highlights"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 6h18" />
            <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" />
            <path d="M10 11v6" />
            <path d="M14 11v6" />
          </svg>
        </button>
      </div>
      <div class="header-right">
        <div id="schedule-week-summary" class="schedule-week-summary" hidden>
          <div class="schedule-week-stats-dots"></div>
          <span class="schedule-week-pnl">—</span>
        </div>
        <div class="page-toggle" role="group" aria-label="Page">
          <button type="button" class="page-toggle-btn is-active" data-page="simulator">Market</button>
          <button type="button" class="page-toggle-btn" data-page="schedule">Schedule / Heatmap</button>
        </div>
      </div>
      <div id="header-stats-progress" class="header-stats-progress" hidden aria-hidden="true">
        <div class="header-stats-progress-bar"></div>
      </div>
    </header>

    <div class="app-body">
      <div id="page-simulator" class="app-page app-page-simulator">
      <div class="left-column">
        <section class="panel settings-panel" aria-label="Wallet">
          <div class="settings-panel-header">
            <button
              type="button"
              id="wallet-balance-refresh"
              class="wallet-header-refresh"
              aria-label="Refresh wallet balance"
              title="Refresh balance"
            >
              <svg class="wallet-balance-refresh-icon" viewBox="0 0 16 16" aria-hidden="true">
                <path
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M2.5 3.5v3h3M13.5 12.5v-3h-3"
                />
                <path
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  d="M3.2 9.2A5 5 0 0 0 12.5 11M12.8 6.8A5 5 0 0 0 3.5 5"
                />
              </svg>
              <span class="settings-panel-title">Wallet</span>
            </button>
            <span id="wallet-balance" class="wallet-header-balance">—</span>
          </div>
          <div id="settings-body" class="settings-panel-body">
            <div class="wallet-summary-rows">
              <div class="wallet-summary-row">
                <span class="wallet-summary-label">Status</span>
                <span id="wallet-status" class="wallet-summary-value">—</span>
              </div>
              <div class="wallet-summary-row">
                <span class="wallet-summary-label">Signer</span>
                <span id="wallet-signer" class="wallet-summary-value wallet-summary-mono" title="">—</span>
              </div>
              <div class="wallet-summary-row">
                <span class="wallet-summary-label">Funder</span>
                <span id="wallet-funder" class="wallet-summary-value wallet-summary-mono" title="">—</span>
              </div>
              <div class="wallet-summary-row">
                <span class="wallet-summary-label">Sig type</span>
                <span id="wallet-sig-type" class="wallet-summary-value">—</span>
              </div>
              <div class="wallet-control-fields">
                <label class="wallet-control-field wallet-control-field--toggle" for="auto-trade">
                  <span class="wallet-control-label">Auto Trade</span>
                  <span class="switch">
                    <input type="checkbox" id="auto-trade" />
                    <span class="switch-slider"></span>
                  </span>
                </label>
                <div id="wallet-shares-field" class="wallet-control-field wallet-control-field--shares">
                  <label class="wallet-control-label" for="manual-order-unit">Size</label>
                  <div class="wallet-size-controls">
                    <select id="manual-order-unit" class="wallet-order-unit" aria-label="Order size unit">
                      <option value="shares">Shares</option>
                      <option value="usdc">USDC</option>
                    </select>
                    <input
                      type="number"
                      id="manual-shares"
                      class="wallet-shares-input"
                      min="1"
                      max="100000"
                      step="1"
                      value="10"
                      aria-label="Order size amount"
                    />
                  </div>
                </div>
                <label id="wallet-use-schedule-field" class="wallet-control-field wallet-control-field--toggle" for="use-schedule" hidden>
                  <span class="wallet-control-label">Use Schedule</span>
                  <span class="switch">
                    <input type="checkbox" id="use-schedule" />
                    <span class="switch-slider"></span>
                  </span>
                </label>
                <label id="wallet-start-trading-field" class="wallet-control-field wallet-control-field--toggle" for="start-trading" hidden>
                  <span class="wallet-control-label">Start Trading</span>
                  <span class="switch">
                    <input type="checkbox" id="start-trading" />
                    <span class="switch-slider"></span>
                  </span>
                </label>
              </div>
            </div>
          </div>
        </section>

        <section class="panel positions-panel" aria-label="Positions">
          <div class="positions-panel-header">
            <div
              class="panel-header-drag-handle"
              data-drag-edge="prev"
              role="separator"
              aria-orientation="horizontal"
              aria-label="Resize Wallet and Positions sections"
              tabindex="0"
            ></div>
            <div class="panel-header-main">
              <h2 class="positions-panel-title">Positions</h2>
              <div class="positions-panel-actions">
                <button type="button" id="positions-clear" class="log-clear-btn">Clear</button>
                <button
                  type="button"
                  id="positions-scroll-bottom"
                  class="log-clear-btn log-scroll-bottom-btn"
                  aria-label="Scroll to bottom"
                  title="Scroll to bottom"
                >
                  <svg viewBox="0 0 12 8" aria-hidden="true">
                    <path fill="currentColor" d="M6 8 0 0h12z" />
                  </svg>
                </button>
              </div>
            </div>
          </div>
          <div id="positions-list" class="positions-body is-collapsed">
            <div class="positions-empty" id="positions-empty">No positions yet</div>
            <div class="positions-cards" id="positions-cards"></div>
          </div>
        </section>

        <section class="panel log-panel" aria-label="Application log">
          <div class="log-panel-header">
            <div
              class="panel-header-drag-handle"
              data-drag-edge="log"
              role="separator"
              aria-orientation="horizontal"
              aria-label="Resize Positions and Log sections"
              tabindex="0"
            ></div>
            <div class="panel-header-main">
              <h2 class="log-panel-title">Log</h2>
              <div class="log-panel-actions">
              <button type="button" id="log-clear" class="log-clear-btn">Clear</button>
              <button
                type="button"
                id="log-scroll-bottom"
                class="log-clear-btn log-scroll-bottom-btn"
                aria-label="Scroll to bottom"
                title="Scroll to bottom"
              >
                <svg viewBox="0 0 12 8" aria-hidden="true">
                  <path fill="currentColor" d="M6 8 0 0h12z" />
                </svg>
              </button>
            </div>
            </div>
          </div>
          <div id="log-output" class="log-output is-collapsed" role="log" aria-live="polite"></div>
        </section>
      </div>

      <div
        id="column-splitter"
        class="column-splitter"
        role="separator"
        aria-orientation="vertical"
        aria-valuenow="50"
        aria-label="Resize columns"
        tabindex="0"
      ></div>

      <section class="panel simulator-panel" aria-label="Simulator">
        <div class="simulator-box-scroll">
        <div class="sim-row">
          <div class="sim-box">
            <div class="sim-cell">
              <div class="sim-label">Price to Beat</div>
              <div id="graph-ptb" class="sim-value">—</div>
            </div>
          </div>
          <div class="sim-box">
            <div class="sim-cell">
              <div class="sim-label">Current</div>
              <div id="graph-current" class="sim-value">—</div>
            </div>
          </div>
          <div class="sim-box">
            <div class="sim-cell">
              <div class="sim-label">Gap</div>
              <div id="graph-gap" class="sim-value">—</div>
            </div>
          </div>
          <div class="sim-box">
            <div class="sim-cell">
              <div class="sim-label">Tick</div>
              <div id="graph-tick" class="sim-value">—</div>
            </div>
          </div>
        </div>
        </div>

        <div class="simulator-box-scroll">
        <div class="quote-row">
          <div class="quote-box quote-box-up" id="quote-up-buy-box">
            <div class="quote-cell">
              <div class="quote-label">Buy</div>
              <div class="quote-values">
                <span id="up-buy-locked" class="quote-locked" hidden></span>
                <span id="up-buy" class="quote-live">—</span>
              </div>
            </div>
          </div>
          <div class="quote-box quote-box-up" id="quote-up-sell-box">
            <div class="quote-cell">
              <div class="quote-label">Sell</div>
              <div class="quote-values">
                <span id="up-sell-locked" class="quote-locked" hidden></span>
                <span id="up-sell" class="quote-live">—</span>
              </div>
            </div>
          </div>
          <div class="quote-box quote-box-down" id="quote-down-buy-box">
            <div class="quote-cell">
              <div class="quote-label">Buy</div>
              <div class="quote-values">
                <span id="down-buy-locked" class="quote-locked" hidden></span>
                <span id="down-buy" class="quote-live">—</span>
              </div>
            </div>
          </div>
          <div class="quote-box quote-box-down" id="quote-down-sell-box">
            <div class="quote-cell">
              <div class="quote-label">Sell</div>
              <div class="quote-values">
                <span id="down-sell-locked" class="quote-locked" hidden></span>
                <span id="down-sell" class="quote-live">—</span>
              </div>
            </div>
          </div>
        </div>
        </div>

        <div class="price-graph-wrap">
          <canvas id="price-chart" aria-label="Market price chart"></canvas>
          <div id="sim-phase-hover" class="sim-phase-hover" hidden></div>
          <div id="sim-marker-tooltip" class="sim-marker-tooltip" hidden></div>
          <button type="button" id="graph-save-btn" class="graph-save-btn" aria-label="Add" hidden>
            <svg class="graph-save-btn-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 5v14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M5 12h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>

      </section>
      </div>

      <div id="page-schedule-heatmap" class="app-page app-page-schedule" hidden>
        <aside class="panel schedule-setups-panel" aria-label="Saved trading setups">
          <div class="schedule-setups-header">
            <div class="schedule-view-toggle" role="group" aria-label="Schedule view">
              <button type="button" class="schedule-view-toggle-btn is-active" data-schedule-view="schedule">Schedule</button>
              <button type="button" class="schedule-view-toggle-btn" data-schedule-view="heatmap">Heatmap</button>
            </div>
          </div>
          <div id="schedule-setups-list" class="schedule-setups-list">
            <div class="schedule-setups-empty">Loading…</div>
          </div>
          <div id="schedule-heatmap-panel" class="schedule-heatmap-panel" hidden></div>
        </aside>
        <section class="schedule-main-panel" aria-label="Schedule and heatmap">
          <div class="schedule-week-layout">
            <div class="schedule-utc-column" aria-label="UTC hours">
              <div class="schedule-utc-header">UTC</div>
              <div class="schedule-utc-body"></div>
            </div>
            <div class="schedule-week-scroll">
              <div class="schedule-week-grid">
            <div class="schedule-day-column" data-day="mon">
              <div class="schedule-day-header">
                <span class="schedule-day-title">Mon</span>
                <span class="schedule-day-pnl">—</span>
              </div>
              <div class="schedule-day-body"></div>
            </div>
            <div class="schedule-day-column" data-day="tue">
              <div class="schedule-day-header">
                <span class="schedule-day-title">Tue</span>
                <span class="schedule-day-pnl">—</span>
              </div>
              <div class="schedule-day-body"></div>
            </div>
            <div class="schedule-day-column" data-day="wed">
              <div class="schedule-day-header">
                <span class="schedule-day-title">Wed</span>
                <span class="schedule-day-pnl">—</span>
              </div>
              <div class="schedule-day-body"></div>
            </div>
            <div class="schedule-day-column" data-day="thu">
              <div class="schedule-day-header">
                <span class="schedule-day-title">Thu</span>
                <span class="schedule-day-pnl">—</span>
              </div>
              <div class="schedule-day-body"></div>
            </div>
            <div class="schedule-day-column" data-day="fri">
              <div class="schedule-day-header">
                <span class="schedule-day-title">Fri</span>
                <span class="schedule-day-pnl">—</span>
              </div>
              <div class="schedule-day-body"></div>
            </div>
            <div class="schedule-day-column" data-day="sat">
              <div class="schedule-day-header">
                <span class="schedule-day-title">Sat</span>
                <span class="schedule-day-pnl">—</span>
              </div>
              <div class="schedule-day-body"></div>
            </div>
            <div class="schedule-day-column" data-day="sun">
              <div class="schedule-day-header">
                <span class="schedule-day-title">Sun</span>
                <span class="schedule-day-pnl">—</span>
              </div>
              <div class="schedule-day-body"></div>
            </div>
              </div>
            </div>
          </div>
        </section>
      </div>
    </div>
  </div>

  <div id="phase-modal" class="modal-overlay" hidden>
    <div class="modal-card" role="dialog" aria-labelledby="phase-modal-title">
      <div class="modal-header">
        <h2 id="phase-modal-title">Phase setup</h2>
        <button type="button" id="phase-modal-close" class="modal-close" aria-label="Close">×</button>
      </div>
      <div class="modal-body">
        <section class="modal-section">
          <h3>Buy</h3>
          <label class="modal-toggle">
            <span>Allow buy in this phase</span>
            <span class="switch">
              <input type="checkbox" id="phase-buy-enabled" />
              <span class="switch-slider"></span>
            </span>
          </label>
          <label class="modal-field">
            <span>Shares to buy</span>
            <input type="number" id="phase-buy-shares" min="1" max="100000" step="1" value="10" />
          </label>
          <label class="modal-field">
            <span>Trigger (¢)</span>
            <input type="number" id="phase-buy-trigger" min="1" max="99" step="1" value="40" />
          </label>
          <label class="modal-toggle">
            <span>Optimize</span>
            <span class="switch">
              <input type="checkbox" id="phase-buy-optimize" />
              <span class="switch-slider"></span>
            </span>
          </label>
          <label class="modal-field" id="phase-max-gap-label">
            <span id="phase-max-gap-text">Max gap ($) None</span>
            <input type="number" id="phase-max-gap" min="0" max="100000" step="0.01" value="0" />
          </label>
          <label class="modal-field" id="phase-min-gap-label">
            <span id="phase-min-gap-text">Min gap ($) None</span>
            <input type="number" id="phase-min-gap" min="0" max="100000" step="0.01" value="0" />
          </label>
          <label class="modal-field">
            <span>Gap vs PTB</span>
            <select id="phase-gap-vs-ptb" class="modal-select">
              <option value="opposite">Opposite</option>
              <option value="with">With</option>
            </select>
          </label>
        </section>
        <section class="modal-section">
          <h3>Sell</h3>
          <label class="modal-field">
            <span>Profit from buy (¢)</span>
            <input type="number" id="phase-sell-profit" min="1" max="99" step="1" value="20" />
          </label>
        </section>
      </div>
      <div class="modal-footer">
        <button type="button" id="phase-modal-save" class="modal-btn-primary">Save</button>
      </div>
    </div>
  </div>

  <div id="setup-save-modal" class="modal-overlay" hidden>
    <div class="modal-card" role="dialog" aria-labelledby="setup-save-modal-title">
      <div class="modal-header">
        <h2 id="setup-save-modal-title">Save trading setup</h2>
        <button type="button" id="setup-save-modal-close" class="modal-close" aria-label="Close">×</button>
      </div>
      <div class="modal-body">
        <label class="modal-field modal-field-stack">
          <span>Title</span>
          <input type="text" id="setup-save-title" maxlength="200" autocomplete="off" />
        </label>
        <label class="modal-field modal-field-stack">
          <span>Description <span class="modal-optional">(optional)</span></span>
          <textarea id="setup-save-description" rows="3" maxlength="2000"></textarea>
        </label>
      </div>
      <div class="modal-footer modal-footer-actions">
        <button type="button" id="setup-save-cancel" class="modal-btn-secondary">Cancel</button>
        <button type="button" id="setup-save-submit" class="modal-btn-primary" disabled>Save</button>
      </div>
    </div>
  </div>

  <div id="setup-edit-modal" class="modal-overlay" hidden>
    <div class="modal-card modal-card-wide" role="dialog" aria-labelledby="setup-edit-modal-title">
      <div class="modal-header setup-edit-modal-header">
        <div class="setup-edit-modal-heading">
          <span class="setup-edit-color-swatch" title="Border color">
            <input type="color" id="setup-edit-color" value="#58a6ff" aria-label="Border color" />
          </span>
          <h2 id="setup-edit-modal-title">Edit trading setup</h2>
        </div>
        <button type="button" id="setup-edit-modal-close" class="modal-close" aria-label="Close">×</button>
      </div>
      <div class="modal-body">
        <label class="modal-field modal-field-stack">
          <span>Title</span>
          <input type="text" id="setup-edit-title" maxlength="200" autocomplete="off" />
        </label>
        <label class="modal-field modal-field-stack">
          <span>Description <span class="modal-optional">(optional)</span></span>
          <textarea id="setup-edit-description" rows="3" maxlength="2000"></textarea>
        </label>
        <div class="setup-edit-chart-wrap">
          <canvas id="setup-edit-chart"></canvas>
          <div id="setup-edit-phase-hover" class="sim-phase-hover" hidden></div>
        </div>
      </div>
      <div class="modal-footer modal-footer-actions">
        <button type="button" id="setup-edit-cancel" class="modal-btn-secondary">Cancel</button>
        <button type="button" id="setup-edit-save" class="modal-btn-primary" disabled>Save</button>
      </div>
    </div>
  </div>

  <script src="/simulator.js"></script>
  <script src="/setup-editor.js"></script>
  <script src="/schedule.js"></script>
  <script src="/app.js"></script>
</body>
</html>
